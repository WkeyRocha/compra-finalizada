<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado pela sua compra - Mercado Livre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="ml-header">
        <div class="header-container">
            <img src="LogoMercadoLivre.png" alt="Mercado Livre" class="ml-logo-img">
        </div>
    </header>

    <main class="main-container">
        <div class="success-card">
            
            <div class="icon-container">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>
                </div>
            </div>
            
            <h1 class="success-title">Sua compra foi confirmada!</h1>
            <p class="success-subtitle">O pagamento foi aprovado e o vendedor já está preparando o seu pacote.</p>
            
            <div class="order-box">
                <p class="order-item"><strong>Nº da operação:</strong> #9876543210</p>
                <p class="order-item"><strong>Produto:</strong> Caixa de Som Philco 1200W</p>
                <p class="order-item"><strong>Previsão de entrega:</strong> Chegará entre amanhã e sexta-feira</p>
            </div>
        <footer class="ml-footer">
            <p>Você receberá um e-mail com a confirmação e o código de rastreio.</p>
        </footer>
    </main>

</body>
</html>
